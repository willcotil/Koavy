<!DOCTYPE html>
<html lang="pt-BR">
<head>
 <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <title>Login Koavy</title>
</head>


<body>
    
    <nav class="fixed top-0 left-0 w-full z-50 backdrop-blur-xl bg-black/40 border-b border-cyan-400/20">
  <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">

    <h1 class="text-2xl font-extrabold bg-gradient-to-r from-cyan-400 to-emerald-400 bg-clip-text text-transparent">
      Koavy
    </h1>

    <div class="hidden md:flex gap-10 text-gray-300">
      <a href="interface.html">Início</a>
      <a href="#" class="hover:text-cyan-400 transition">Benefícios</a>
      <a href="#" class="hover:text-cyan-400 transition">Sobre</a>
    </div>

    <a href="cadastro.html" class="hidden md:block bg-gradient-to-r from-cyan-400 to-emerald-400 text-black px-6 py-2 rounded-full font-bold hover:scale-105 transition">
      Cadastrar-se
    </a>

    <button id="menu-btn" class="md:hidden text-white text-2xl">
      ☰
    </button>

  </div>

  <div id="mobile-menu" class="hidden flex-col items-center gap-6 py-6 bg-black/90 md:hidden">
    <a href="interface.html">Início</a>
    <a href="#" class="text-gray-300 hover:text-cyan-400">Benefícios</a>
    <a href="#" class="text-gray-300 hover:text-cyan-400">Sobre</a>

    <a href="cadastro.html" class="bg-gradient-to-r from-cyan-400 to-emerald-400 text-black px-6 py-2 rounded-full font-bold">
      Cadastrar-se
    </a>
  </div>
</nav>


<main id="container">

    <div class="brilhoPosterior"></div>

    

    <form id="login_form">
        <div id="form_header">
            <h1>Login</h1>
           
        </div>

        <div id="social_media">
            <a href="#">
                <img src="imagens/google.png" alt="Google">
            </a>
        </div>

        <div id="inputs">

            <div class="input-box">
                <label for="name">Nome</label>
                <div class="input-field">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="name" name="nome" placeholder="Digite seu nome">
                </div>
            </div>

            <div class="input-box">
                <label for="password">Senha</label>
                <div class="input-field">
                    <i class="fa-solid fa-key"></i>
                    <input type="password" id="password" name="senha" placeholder="Digite sua senha">
                </div>

                <div id="forgot_password">
                    <a href="#">Esqueceu sua senha?</a>
                </div>
            </div>

        </div>

        <button type="submit" id="login_button">
            Login
        </button>
        <div id="mensagemErro" style="color:red; margin-top:10px;"></div>
    </form>

</main>

<script src="https://cdn.tailwindcss.com"></script>
<script src="login.js"></script>
</body>
</html>
