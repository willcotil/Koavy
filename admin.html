<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Koavy</title>
  <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-gray-900 text-white flex">

<aside class="w-64 h-screen bg-black/40 backdrop-blur-xl border-r border-cyan-400/20 p-6 fixed">
  <h1 class="text-2xl font-bold text-cyan-400 mb-10">KOAVY</h1>
  <nav class="flex flex-col gap-4">
    <button onclick="mostrar('dashboard')" class="text-left hover:text-cyan-400 transition-colors">Dashboard</button>
    <button onclick="mostrar('usuarios')" class="text-left hover:text-cyan-400 transition-colors">Usuários</button>
    <button onclick="mostrar('dados')" class="text-left hover:text-cyan-400 transition-colors">Dados</button>
    <button onclick="logout()" class="text-left text-red-400 mt-10 hover:brightness-125">Sair</button>
  </nav>
</aside>

<main class="flex-1 p-10 ml-64">
  <h1 class="text-3xl font-bold mb-8">Painel Administrativo</h1>

  <div id="modalEditar" class="fixed inset-0 bg-black/80 hidden items-center justify-center z-50">
    <div class="bg-gray-900 p-8 rounded-xl w-[450px] border border-cyan-400/20 overflow-y-auto max-h-[90vh] shadow-2xl">
      <h2 class="text-xl mb-4 text-cyan-400 font-bold">Editar Paciente</h2>
      
      <div class="space-y-1">
        <label class="text-xs text-gray-400">Dados Pessoais</label>
        <input id="editNome" type="text" placeholder="Nome completo">
        <input id="editEmail" type="email" placeholder="Email">
        <input id="editTelefone" type="text" placeholder="Telefone">
        
        <label class="text-xs text-gray-400 block mt-2">Biometria</label>
        <div class="grid grid-cols-3 gap-2">
          <input id="editIdade" type="number" placeholder="Idade">
          <input id="editPeso" type="number" placeholder="Peso (kg)">
          <input id="editAltura" type="number" placeholder="Altura (cm)">
        </div>

        <div class="grid grid-cols-2 gap-2">
            <input id="editSexo" type="text" placeholder="Sexo">
            <input id="editTipoSanguineo" type="text" placeholder="Tipo Sanguíneo">
        </div>

        <label class="text-xs text-gray-400 block mt-2">Saúde</label>
        <input id="editMarcapasso" type="text" placeholder="Marcapasso (Sim/Não)">
        <input id="editCep" type="text" placeholder="CEP">
        <input id="editDataNascimento" type="date">
        <textarea id="editObs" placeholder="Observações médicas" rows="3"></textarea>
      </div>

      <div class="flex justify-end gap-3 mt-6">
        <button onclick="fecharModal()" class="px-4 py-2 bg-gray-700 hover:bg-gray-600 rounded transition-colors">
          Cancelar
        </button>
        <button onclick="salvarEdicao()" class="px-6 py-2 bg-cyan-500 hover:bg-cyan-400 text-black rounded font-bold transition-all">
          Atualizar Dados
        </button>
      </div>
    </div>
  </div>

  <div id="modalTutor" class="fixed inset-0 bg-black/80 hidden items-center justify-center z-50">
    <div class="bg-gray-900 p-8 rounded-xl w-[400px] border border-cyan-400/20 shadow-2xl">
      <h2 class="text-xl mb-4 text-cyan-400 font-bold">Editar Vínculo (Tutor)</h2>

      <input id="editTutorNome" type="text" placeholder="Nome do Tutor">
      <input id="editTutorPaciente" type="number" placeholder="ID do Paciente">
      <input id="editTutorData" type="date">

      <div class="flex justify-end gap-3 mt-6">
        <button onclick="fecharModalTutor()" class="px-4 py-2 bg-gray-700 hover:bg-gray-600 rounded transition-colors">
          Cancelar
        </button>
        <button onclick="salvarEdicaoTutor()" class="px-6 py-2 bg-cyan-500 hover:bg-cyan-400 text-black rounded font-bold transition-all">
          Salvar Tutor
        </button>
      </div>
    </div>
  </div>

  <section id="dashboard">
    <div class="grid grid-cols-3 gap-6">
      <div class="bg-gray-800 p-6 rounded-xl border border-gray-700">
        <h3 class="text-gray-400">Total Usuários</h3>
        <p class="text-4xl text-cyan-400 font-bold">0</p>
      </div>
      <div class="bg-gray-800 p-6 rounded-xl border border-gray-700">
        <h3 class="text-gray-400">Pacientes</h3>
        <p class="text-4xl text-green-400 font-bold">0</p>
      </div>
      <div class="bg-gray-800 p-6 rounded-xl border border-gray-700">
        <h3 class="text-gray-400">Admins</h3>
        <p class="text-4xl text-purple-400 font-bold">0</p>
      </div>
    </div>
  </section>

  <section id="usuarios" class="hidden mt-10">
    <div class="flex justify-between items-center mb-4">
        <h2 class="text-2xl font-bold">Gestão de Usuários</h2>
    </div>
    
    <div class="overflow-x-auto shadow-xl rounded-xl">
      <table class="w-full bg-gray-800 text-left">
        <thead class="bg-gray-700 text-cyan-400 uppercase text-xs">
          <tr>
            <th class="p-4">Nome</th>
            <th>Email</th>
            <th>Tipo</th>
            <th>Status</th>
            <th class="text-center">Ações</th>
          </tr>
        </thead>
        <tbody id="tabelaUsuarios" class="divide-y divide-gray-700">
            </tbody>
      </table>
    </div>

    <h2 class="text-2xl font-bold mt-12 mb-4">Vínculos de Tutores</h2>
    <div class="overflow-x-auto shadow-xl rounded-xl">
      <table class="w-full bg-gray-800 text-left">
        <thead class="bg-gray-700 text-cyan-400 uppercase text-xs">
          <tr>
            <th class="p-4">Nome Tutor</th>
            <th>ID Paciente</th>
            <th>Data Vínculo</th>
            <th class="text-center">Ações</th>
          </tr>
        </thead>
        <tbody id="tabelaTutores" class="divide-y divide-gray-700">
            </tbody>
      </table>
    </div>
  </section>

  <section id="dados" class="hidden mt-10">
    <h2 class="text-2xl font-bold mb-6">Monitoramento em Tempo Real</h2>
    <div id="dadosCardiacos" class="grid grid-cols-3 gap-6">
        <p class="text-gray-500 italic">Carregando telemetria...</p>
    </div>
  </section>

</main>

<script src="admin.js"></script>
</body>
</html>
