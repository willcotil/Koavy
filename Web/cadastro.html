<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro - Koavy</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            neon1: '#00f2ff',
            neon2: '#00d4aa',
            dark1: '#121212',
            dark2: '#0f1011',
          }
        }
      }
    }
  </script>
</head>

<body class="bg-dark2 text-gray-300 font-inter min-h-screen">

<!-- NAVBAR -->
<nav class="fixed top-0 left-0 w-full z-50 backdrop-blur-xl bg-black/40 border-b border-white/5">
  <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
    <div class="flex items-center gap-2">
      <a href="interface.html" class="flex items-center gap-2">
        <div class="w-8 h-8 bg-gradient-to-br from-neon1 to-neon2 rounded-lg flex items-center justify-center">
          <span class="text-black font-black text-xl">K</span>
        </div>
        <h1 class="text-2xl font-black bg-gradient-to-r from-neon1 to-neon2 bg-clip-text text-transparent logo">Koavy</h1>
      </a>
    </div>

    <div class="hidden md:flex gap-10 text-sm font-bold tracking-widest uppercase">
      <a href="interface.html" class="hover:text-neon1 transition">Início</a>
      <a href="interface.html#beneficios" class="hover:text-neon1 transition">Benefícios</a>
      <a href="interface.html#sobre" class="hover:text-neon1 transition">Sobre</a>
    </div>

    <a href="login.html" class="hidden md:block border border-white/10 px-8 py-2 rounded-full font-bold hover:bg-white/5 transition">
      Login
    </a>
  </div>
</nav>

<div class="pt-32 pb-20 px-4 flex justify-center items-center min-h-screen">
  <div class="max-w-4xl w-full bg-white/5 border border-white/10 rounded-[40px] p-8 lg:p-16 backdrop-blur-md shadow-2xl relative overflow-hidden reveal reveal-zoom active">
    
    <div class="absolute top-0 right-0 w-64 h-64 bg-neon1/5 rounded-full blur-[100px] -z-10"></div>
    <div class="absolute bottom-0 left-0 w-64 h-64 bg-neon2/5 rounded-full blur-[100px] -z-10"></div>

    <div class="text-center mb-12">
      <h1 class="text-4xl font-black text-white mb-4">Cadastro de Paciente</h1>
      <p class="text-gray-500 max-w-md mx-auto">Junte-se à Koavy e comece seu monitoramento cardíaco inteligente hoje mesmo.</p>
    </div>

    <form id="formCadastro" class="space-y-12">
      
      <!-- SEÇÃO 1: ACESSO -->
      <section>
        <div class="flex items-center gap-4 mb-8">
          <div class="w-10 h-10 rounded-2xl bg-neon1/10 flex items-center justify-center text-neon1 font-bold italic">01</div>
          <h2 class="text-xl font-bold text-white">Informações de Acesso</h2>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div class="space-y-2">
            <label class="text-xs font-black uppercase tracking-widest text-gray-500 ml-1">Nome Completo</label>
            <input id="nome" type="text" placeholder="Como devemos te chamar?" class="cadastro-input">
          </div>
          <div class="space-y-2">
            <label class="text-xs font-black uppercase tracking-widest text-gray-500 ml-1">E-mail</label>
            <input id="email" type="email" placeholder="seu@email.com" class="cadastro-input">
          </div>
          <div class="space-y-2">
            <label class="text-xs font-black uppercase tracking-widest text-gray-500 ml-1">Senha de Acesso</label>
            <input id="senha" type="password" placeholder="••••••••" class="cadastro-input">
          </div>
          <div class="space-y-2">
            <label class="text-xs font-black uppercase tracking-widest text-gray-500 ml-1">WhatsApp / Telefone</label>
            <input id="telefone" type="text" placeholder="(00) 00000-0000" class="cadastro-input">
          </div>
        </div>
      </section>

      <!-- SEÇÃO 2: BIOMETRIA -->
      <section>
        <div class="flex items-center gap-4 mb-8">
          <div class="w-10 h-10 rounded-2xl bg-neon2/10 flex items-center justify-center text-neon2 font-bold italic">02</div>
          <h2 class="text-xl font-bold text-white">Dados Biométricos</h2>
        </div>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
          <div class="space-y-2 col-span-2">
            <label class="text-xs font-black uppercase tracking-widest text-gray-500 ml-1">Data de Nascimento</label>
            <input id="dataNascimento" type="date" class="cadastro-input">
          </div>
          <div class="space-y-2">
            <label class="text-xs font-black uppercase tracking-widest text-gray-500 ml-1">Peso (kg)</label>
            <input id="peso" type="number" placeholder="75" class="cadastro-input">
          </div>
          <div class="space-y-2">
            <label class="text-xs font-black uppercase tracking-widest text-gray-500 ml-1">Altura (cm)</label>
            <input id="altura" type="number" placeholder="180" class="cadastro-input">
          </div>
          <div class="space-y-2 col-span-2 md:col-span-1">
            <label class="text-xs font-black uppercase tracking-widest text-gray-500 ml-1">Sexo</label>
            <select id="sexo" class="cadastro-input">
              <option value="">Selecione</option>
              <option value="M">Masculino</option>
              <option value="F">Feminino</option>
              <option value="O">Outro</option>
            </select>
          </div>
          <div class="space-y-2 col-span-2 md:col-span-1">
            <label class="text-xs font-black uppercase tracking-widest text-gray-500 ml-1">Tipo Sanguíneo</label>
            <input id="tipoSanguineo" type="text" placeholder="O+" class="cadastro-input">
          </div>
        </div>
      </section>

      <!-- SEÇÃO 3: SAÚDE -->
      <section>
        <div class="flex items-center gap-4 mb-8">
          <div class="w-10 h-10 rounded-2xl bg-purple-500/10 flex items-center justify-center text-purple-500 font-bold italic">03</div>
          <h2 class="text-xl font-bold text-white">Histórico e Saúde</h2>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div class="space-y-2">
            <label class="text-xs font-black uppercase tracking-widest text-gray-500 ml-1">Usa Marcapasso?</label>
            <select id="marcapasso" class="cadastro-input">
              <option value="Não">Não</option>
              <option value="Sim">Sim</option>
            </select>
          </div>
          <div class="space-y-2">
            <label class="text-xs font-black uppercase tracking-widest text-gray-500 ml-1">CEP Residencial</label>
            <input id="cep" type="text" placeholder="00000-000" class="cadastro-input">
          </div>
          <div class="space-y-2 md:col-span-2">
            <label class="text-xs font-black uppercase tracking-widest text-gray-500 ml-1">Observações Médicas Importantes</label>
            <textarea id="obsMed" placeholder="Ex: Alergia a medicamentos, cirurgias prévias..." class="cadastro-input h-32 py-4"></textarea>
          </div>
        </div>
      </section>

      <div class="pt-6 border-t border-white/5">
        <div id="mensagemErro" class="hidden p-4 mb-6 bg-red-500/10 border border-red-500/20 rounded-2xl text-red-500 text-sm font-bold text-center"></div>
        <div id="mensagemSucesso" class="hidden p-4 mb-6 bg-emerald-500/10 border border-emerald-500/20 rounded-2xl text-emerald-500 text-sm font-bold text-center"></div>

        <button id="btnCadastro" type="submit" class="w-full py-5 bg-gradient-to-r from-neon1 to-neon2 text-black font-black text-lg rounded-2xl shadow-xl shadow-neon1/20 hover:scale-[1.01] active:scale-[0.99] transition-all">
          Finalizar Cadastro
        </button>
        
        <p class="mt-8 text-center text-gray-500 text-sm">
          Não é um paciente? 
          <a href="cadastrotutor.html" class="text-neon1 font-bold hover:underline ml-1">Cadastrar como Tutor</a>
        </p>
      </div>

    </form>
  </div>
</div>

<style>
  .cadastro-input {
    @apply w-full bg-black/40 border border-white/10 rounded-2xl px-6 py-4 text-white focus:outline-none focus:border-neon1/50 focus:ring-1 focus:ring-neon1/20 transition-all placeholder:text-gray-700;
  }
</style>

<script defer src="cadastro.js"></script>
</body>
</html>
