<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Cadastro - Paciente</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="style.css">

<script defer src="cadastro.js"></script>
</head>

<body class="bg-[#0f1011]">

<!-- NAVBAR -->
<nav class="fixed top-0 left-0 w-full z-50 backdrop-blur-xl bg-black/40 border-b border-cyan-400/20">
  <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">

    <h1 class="text-2xl font-extrabold bg-gradient-to-r from-cyan-400 to-emerald-400 bg-clip-text text-transparent">
      Koavy
    </h1>

    <div class="hidden md:flex gap-10 text-gray-300">
      <a href="interface.html">Início</a>
      <a href="#">Benefícios</a>
      <a href="#">Sobre</a>
    </div>

    <a href="login.html" class="hidden md:block bg-gradient-to-r from-cyan-400 to-emerald-400 text-black px-6 py-2 rounded-full font-bold hover:scale-105 transition">
      Login
    </a>

  </div>
</nav>

<!-- CADASTRO -->
<div id="containercd">

  <div id="cadastro_form">

    <div class="form-header">
      <h1 class="titulo-cadastro">Cadastro do Paciente Cardíaco</h1>
      <p class="subtitulo">Monitoramento inteligente e seguro Koavy</p>
    </div>

    <form id="formCadastro" class="space-y-6">

      <!-- LINHA 1 -->
      <div class="grid grid-cols-4 gap-4">
        <div class="input-field"><input id="nome" placeholder="Nome completo"></div>
        <div class="input-field"><input id="email" placeholder="Email"></div>
        <div class="input-field"><input id="senha" type="password" placeholder="Senha"></div>
        <div class="input-field"><input id="telefone" placeholder="Telefone"></div>
      </div>

      <!-- LINHA 2 -->
      <div class="grid grid-cols-4 gap-4">
        <div class="input-field"><input id="idade" placeholder="Idade"></div>
        <div class="input-field"><input id="peso" placeholder="Peso (kg)"></div>
        <div class="input-field"><input id="altura" placeholder="Altura (cm)"></div>
        <div class="input-field"><input id="sexo" placeholder="Sexo"></div>
      </div>

      <!-- LINHA 3 -->
      <div class="grid grid-cols-4 gap-4">
        <div class="input-field"><input id="tipoSanguineo" placeholder="Tipo Sanguíneo"></div>
        <div class="input-field"><input id="marcapasso" placeholder="Marcapasso (sim/não)"></div>
        <div class="input-field"><input id="cep" placeholder="CEP"></div>
        <div class="input-field"><input id="obsMed" placeholder="Observações médicas"></div>
      </div>

      <!-- LINHA 4 (DATA DE NASCIMENTO) -->
     <div class="grid grid-cols-4 gap-4">
  <div class="input-field col-span-4">
    <label class="text-gray-400 text-sm">Data de nascimento</label>
    <input id="dataNascimento" type="date">
  </div>
</div>

      <p id="mensagemErro" class="mensagem-erro"></p>
      <p id="mensagemSucesso" class="mensagem-sucesso"></p>

      <button id="btnCadastro" type="submit">
        Cadastrar Paciente
      </button>

    </form>

    <a href="cadastrotutor.html" class="btn-small btn-tutor">
      Sou Tutor
    </a>

  </div>

</div>

</body>
</html>
